version: "3.9"

services:

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: php
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network
        depends_on:
            - postgres
            - rabbitmq


    messenger:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: messenger
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network
        depends_on:
            - php
            - rabbitmq
            - postgres
        command: php bin/console messenger:consume async


    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8081:80"
        volumes:
            - ./:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - app-network


    postgres:
        image: postgres:16
        container_name: postgres
        environment:
            POSTGRES_USER: Nikita
            POSTGRES_PASSWORD: 2008
            POSTGRES_DB: mydb
        ports:
            - "5432:5432"
        networks:
            - app-network


    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        networks:
            - app-network


networks:
    app-network:
        driver: bridge
