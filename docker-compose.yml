version: "3.9"

services:

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: php
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./.env:/var/www/.env
        networks:
            - app-network
        depends_on:
            - mongodb
            - rabbitmq

    messenger:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: messenger
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network
        depends_on:
            - php
            - rabbitmq
            - mongodb
        command: php bin/console messenger:consume async

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8081:80"
        volumes:
            - ./:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - app-network

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        networks:
            - app-network


    mongodb:
        image: mongo:7.0
        container_name: mongo
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME:-root}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-root}
            MONGO_INITDB_DATABASE: ${MONGODB_DB:-app}
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        networks:
            - app-network


networks:
    app-network:
        driver: bridge

volumes:
    mongodb_data:
